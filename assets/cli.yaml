name: ab_guess_game
version: "0.1.0"
author: Luke Euler <luke16times@gmail.com>
about: AB Guessing Game
args:
    - width:
        short: w
        long: width
        value_name: u32
        help: Sets the window width
        default_value: "900"
    - height:
        # short: h: -h for --help
        long: height
        value_name: u32
        help: Sets the window height
        default_value: "556"
    - terminal:
        short: t
        long: terminal
        value_name: bool
        help: Switch to terminal mode
        default_value: "false"
